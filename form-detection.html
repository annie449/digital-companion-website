<!DOCTYPE html>
<html>
<head>
  <title>Form Detection</title>
</head>
<body style="display:none;">
  <!-- This form is only for Netlify to detect the fields -->
  <form name="digital-companion-survey" netlify netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="digital-companion-survey">
    <input type="text" name="name">
    <input type="email" name="email">
    <input type="radio" name="beta_tester">
    <select name="heard_from"></select>
    <input type="radio" name="experienced_loss">
    <input type="checkbox" name="challenges">
    <input type="text" name="challenges_other">
    <input type="checkbox" name="helpful_resources">
    <input type="text" name="resources_other">
    <input type="checkbox" name="valuable_features">
    <input type="text" name="features_other">
    <textarea name="additional_feedback"></textarea>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
